repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty-check
        name: Run ty type check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest
        name: Run pytest
        entry: uv run pytest
        language: python
        types: [python]
        pass_filenames: false
        always_run: true
      - id: registry-validate
        name: Validate plugins registry
        entry: uv run registry validate
        language: system
        pass_filenames: false
        always_run: true
