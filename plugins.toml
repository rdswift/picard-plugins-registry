updated_at = "2026-04-27T18:03:12Z"
versioning_scheme = "semver"
homepage = "https://git.sr.ht/~phw/picard-plugin-decade"
license = "GPL-2.0-or-later"
license_url = "https://www.gnu.org/licenses/gpl-2.0.html"
long_description = """
Add a $decade(date) scripting function to get the decade from a year.

E.g. `$decade(1994-04-05)` will return \"90s\". By default decades between 1920 and 2000
will be shortened to two digits. You can disable this with setting the second parameter
to 0, e.g. `$decade(1994,0)` will return \"1990s\"."""
report_bugs_to = "https://todo.sr.ht/~phw/picard-plugins"

