[[plugins]]
id = "decade"
uuid = "1e6f5357-bbfb-4575-82fe-40706708af76"
name = "Decade function"
description = "Add a $decade(date) scripting function to get the decade from a year"
git_url = "https://git.sr.ht/~phw/picard-plugin-decade"
categories = [
  "scripting",
]
trust_level = "trusted"
authors = [
  "Philipp Wolfer",
]
